name: Watch PATH Seats

on:
  schedule:
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      ND_TERM: ${{ vars.ND_TERM || 'Fall Semester 2026' }}
      ND_CRNS: ${{ vars.ND_CRNS }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check PATH seats
        id: check
        run: |
          set +e
          npm run check > watch-output.txt 2>&1
          code=$?
          set -e
          echo "code=$code" >> "$GITHUB_OUTPUT"

      - name: Print check output
        if: always()
        run: cat watch-output.txt

      - name: Build email body
        if: steps.check.outputs.code == '1'
        run: |
          {
            echo "A watched Notre Dame PATH class may have opened."
            echo ""
            echo "Go to NOVO manually. This workflow does not register you."
            echo ""
            echo "Workflow URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "----- watch-output.txt -----"
            cat watch-output.txt
          } > email-body.txt

      - name: Send seat-open email
        if: steps.check.outputs.code == '1'
        uses: dawidd6/action-send-mail@v18
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: ND Seat Watcher <${{ secrets.SMTP_USERNAME }}>
          to: ${{ secrets.ALERT_TO }}
          subject: ND seat may be open
          priority: high
          body: file://email-body.txt

      - name: Fail workflow if seat is open
        if: steps.check.outputs.code == '1'
        run: exit 1

      - name: Fail workflow if script/site error
        if: steps.check.outputs.code != '0' && steps.check.outputs.code != '1'
        run: exit ${{ steps.check.outputs.code }}

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: debug/
          if-no-files-found: ignore
          retention-days: 3
